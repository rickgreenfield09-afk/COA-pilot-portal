<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COA Employee Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--void:#0D1117;--surface:#161C26;--raised:#1E2733;--teal:#2AB8A6;--amber:#E8B84B;--red:#E05252;--purple:#BF5FFF;--header:#3E4E6C;--text:#F2EDE4;--sub:#8E92B0;--muted:#5C607E;--border:#2E3440;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--void);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;}

  /* ---------- Login screen ---------- */
  .login-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;}
  .login-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:40px;width:100%;max-width:380px;}
  .login-brand-img{display:block;max-width:180px;height:auto;margin:0 auto 14px;}
  .login-logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:var(--teal);text-align:center;margin-bottom:4px;}
  .login-sub{font-size:12px;font-family:'DM Mono',monospace;color:var(--sub);text-align:center;margin-bottom:28px;letter-spacing:1px;}
  .field-label{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;display:block;}
  .field-input{width:100%;background:var(--raised);border:1px solid var(--border);border-radius:6px;padding:12px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color 0.15s;margin-bottom:18px;}
  .field-input:focus{border-color:var(--teal);}
  .field-input::placeholder{color:var(--muted);}
  .btn{width:100%;padding:12px;border-radius:6px;border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.15s;}
  .btn-primary{background:var(--teal);color:var(--void);}
  .btn-primary:hover{background:#35d4c0;}
  .btn-primary:disabled{background:var(--border);color:var(--muted);cursor:default;}
  .login-error{font-size:12px;color:var(--red);font-family:'DM Mono',monospace;margin-top:14px;text-align:center;min-height:16px;}

  /* ---------- App shell ---------- */
  #app-shell{display:none;flex:1;flex-direction:column;}
  #app-shell.active{display:flex;}
  header{background:var(--header);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0;}
  .logo-wrap{display:flex;align-items:center;gap:12px;}
  .header-logo-img{height:32px;width:auto;display:block;background:#fff;border-radius:6px;padding:4px 8px;}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--teal);}
  .header-right{display:flex;align-items:center;gap:14px;}
  .user-email{font-size:12px;color:var(--sub);font-family:'DM Mono',monospace;}
  .btn-logout{background:var(--raised);border:1px solid var(--border);border-radius:6px;padding:7px 14px;font-size:12px;color:var(--sub);cursor:pointer;transition:all 0.15s;}
  .btn-logout:hover{border-color:var(--red);color:var(--red);}
  nav{background:var(--surface);border-bottom:1px solid var(--border);display:flex;padding:0 24px;gap:4px;flex-shrink:0;}
  .nav-btn{background:none;border:none;color:var(--sub);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:14px 16px;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;}
  .nav-btn:hover{color:var(--text);}
  .nav-btn.active{color:var(--teal);border-bottom-color:var(--teal);}
  main{flex:1;padding:24px;overflow-y:auto;}
  .screen{display:none;animation:fadeIn 0.2s ease;}
  .screen.active{display:block;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
  .placeholder-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:40px;text-align:center;}
  .placeholder-title{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--text);margin-bottom:8px;}
  .placeholder-sub{font-size:13px;color:var(--sub);}

  /* ---------- Profile screen ---------- */
  .profile-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:28px;}
  .profile-top{display:flex;align-items:center;gap:16px;margin-bottom:24px;}
  .profile-photo-initials{width:64px;height:64px;border-radius:50%;background:var(--raised);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--teal);flex-shrink:0;}
  .profile-name{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;}
  .profile-role{font-size:13px;color:var(--sub);font-family:'DM Mono',monospace;margin-top:2px;}
  .profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
  .info-box{background:var(--raised);border-radius:6px;padding:14px;}
  .info-label{font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;}
  .info-val{font-size:14px;color:var(--text);}
  .bio-box{background:var(--raised);border-radius:6px;padding:14px;margin-bottom:20px;}
  .clearance-section{border-top:1px solid var(--border);padding-top:16px;}
  .profile-actions{display:flex;gap:10px;margin-top:20px;}
  .btn-edit{padding:9px 18px;border-radius:6px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;background:var(--raised);color:var(--teal);border:1px solid var(--border);transition:all 0.15s;}
  .btn-edit:hover{border-color:var(--teal);}
  .btn-save{padding:9px 18px;border-radius:6px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;background:var(--teal);color:var(--void);transition:all 0.15s;}
  .btn-save:hover{background:#35d4c0;}
  .btn-cancel{padding:9px 18px;border-radius:6px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:var(--sub);border:1px solid var(--border);transition:all 0.15s;}
  .btn-cancel:hover{color:var(--text);}
  .info-edit-input{width:100%;background:var(--surface);border:1px solid var(--teal);border-radius:4px;padding:6px 8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;}
  .save-status{font-size:12px;color:var(--teal);font-family:'DM Mono',monospace;margin-left:8px;}

  /* ---------- Modal ---------- */
  .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);align-items:center;justify-content:center;z-index:100;}
  .modal-overlay.active{display:flex;}
  .modal-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:28px;max-width:380px;width:90%;}
  .modal-title{font-family:'Bebas Neue',sans-serif;font-size:20px;margin-bottom:10px;}
  .modal-text{font-size:13px;color:var(--sub);margin-bottom:20px;line-height:1.5;}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;}

  /* ---------- Resume screen ---------- */
  .resume-search-wrap{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:18px;margin-bottom:20px;display:flex;gap:10px;flex-wrap:wrap;align-items:flex-start;}
  .resume-search-input{flex:1;min-width:220px;margin-bottom:0;}
  #resume-search-results{width:100%;display:flex;flex-direction:column;gap:6px;margin-top:10px;}
  .search-result-row{background:var(--raised);border:1px solid var(--border);border-radius:6px;padding:10px 14px;cursor:pointer;transition:border-color .15s;}
  .search-result-row:hover{border-color:var(--teal);}
  .resume-viewing-banner{font-size:12px;color:var(--sub);font-family:'DM Mono',monospace;margin-bottom:14px;}
  .resume-viewing-banner a{color:var(--teal);text-decoration:none;}
  .resume-viewing-banner a:hover{text-decoration:underline;}
  .resume-section{border-top:1px solid var(--border);padding-top:16px;margin-top:16px;}
  .resume-section-title{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;}
  .resume-view-row{background:var(--raised);border-radius:6px;padding:12px 14px;margin-bottom:8px;}
  .resume-view-row-title{font-size:14px;color:var(--text);font-weight:500;}
  .resume-view-row-dates{font-size:12px;color:var(--sub);font-family:'DM Mono',monospace;margin-top:2px;}
  .resume-view-row-desc{font-size:13px;color:var(--sub);margin-top:6px;line-height:1.4;}
  .resume-row{background:var(--raised);border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:10px;}
  .resume-row-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
  .btn-add-row{background:none;border:1px dashed var(--border);border-radius:6px;padding:8px 14px;color:var(--teal);font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:4px;}
  .btn-add-row:hover{border-color:var(--teal);}
  .btn-remove-row{background:none;border:none;color:var(--red);font-size:11px;font-family:'DM Mono',monospace;cursor:pointer;padding:2px 0;}
  .btn-remove-row:hover{text-decoration:underline;}
  .skills-tags{display:flex;flex-wrap:wrap;gap:8px;}
  .skill-tag{background:var(--raised);border:1px solid var(--border);border-radius:14px;padding:5px 12px;font-size:12px;color:var(--teal);font-family:'DM Mono',monospace;}
  .resume-row-header{font-size:11px;font-family:'DM Mono',monospace;color:var(--teal);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
  .resume-row-checkbox{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--sub);margin-bottom:8px;}
  .resume-row-checkbox input{width:auto;}
  .skill-pill-input-wrap{position:relative;}
  .skill-pill-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
  .skill-pill{background:var(--raised);border:1px solid var(--teal);border-radius:14px;padding:5px 10px 5px 12px;font-size:12px;color:var(--teal);font-family:'DM Mono',monospace;display:flex;align-items:center;gap:6px;}
  .skill-pill button{background:none;border:none;color:var(--red);cursor:pointer;font-size:13px;line-height:1;padding:0;}
  .skill-bank-panel{background:var(--surface);border:1px solid var(--border);border-radius:6px;margin-top:10px;display:flex;flex-direction:column;}
  .skill-bank-options-list{overflow-y:auto;max-height:220px;padding:4px 0;}
  .skill-bank-option{padding:8px 12px;font-size:13px;color:var(--text);cursor:pointer;}
  .skill-bank-option:hover{background:var(--raised);}
  .skill-bank-option.add-new{color:var(--teal);}
</style>
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div class="login-wrap" id="login-wrap">
    <div class="login-card">
      <img class="login-brand-img" src="https://llkatqqkzjzqfaosmrjl.supabase.co/storage/v1/object/public/Assets/COA-Transparent.png" alt="COA logo">
      <div class="login-logo">COA PORTAL</div>
      <div class="login-sub">EMPLOYEE SIGN IN</div>
      <label class="field-label" for="login-email">Email</label>
      <input type="email" id="login-email" class="field-input" placeholder="you@company.com" autocomplete="username">
      <label class="field-label" for="login-password">Password</label>
      <input type="password" id="login-password" class="field-input" placeholder="••••••••" autocomplete="current-password">
      <button class="btn btn-primary" id="login-btn" onclick="handleLogin()">Sign In</button>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>

  <!-- APP SHELL -->
  <div id="app-shell">
    <header>
      <div class="logo-wrap">
        <img class="header-logo-img" src="https://llkatqqkzjzqfaosmrjl.supabase.co/storage/v1/object/public/Assets/COA-Transparent.png" alt="COA logo">
        <div class="logo">COA PORTAL</div>
      </div>
      <div class="header-right">
        <span class="user-email" id="user-email-display"></span>
        <button class="btn-logout" onclick="handleLogout()">Sign Out</button>
      </div>
    </header>
    <nav>
      <button class="nav-btn active" data-screen="profile" onclick="requestSwitchScreen('profile')">Profile</button>
      <button class="nav-btn" data-screen="directory" onclick="requestSwitchScreen('directory')">Directory</button>
      <button class="nav-btn" data-screen="resume" onclick="requestSwitchScreen('resume')">Resume</button>
      <button class="nav-btn" data-screen="travel" onclick="requestSwitchScreen('travel')">Travel</button>
    </nav>
    <main>
      <div class="screen active" id="screen-profile">
        <div id="profile-content">
          <div class="placeholder-card">
            <div class="placeholder-sub">Loading profile...</div>
          </div>
        </div>
      </div>
      <div class="screen" id="screen-directory">
        <div class="placeholder-card">
          <div class="placeholder-title">Directory</div>
          <div class="placeholder-sub">Coming next session</div>
        </div>
      </div>
      <div class="screen" id="screen-resume">
        <div class="resume-search-wrap" id="resume-search-wrap" style="display:none;">
          <input type="text" id="resume-search-input" class="info-edit-input resume-search-input" placeholder="Search resumes — e.g. PMP, Six Sigma, DoD contract...">
          <button class="btn-edit" onclick="searchResumes()">Search</button>
          <div id="resume-search-results"></div>
        </div>
        <div id="resume-viewing-banner"></div>
        <div id="resume-content">
          <div class="placeholder-card">
            <div class="placeholder-sub">Loading resume...</div>
          </div>
        </div>
      </div>
      <div class="screen" id="screen-travel">
        <div class="placeholder-card">
          <div class="placeholder-title">Travel</div>
          <div class="placeholder-sub">Coming next session</div>
        </div>
      </div>
    </main>
  </div>

  <!-- UNSAVED CHANGES MODAL -->
  <div class="modal-overlay" id="unsaved-modal">
    <div class="modal-box">
      <div class="modal-title">Discard changes?</div>
      <div class="modal-text">You have unsaved changes to your profile. Leaving now will discard them.</div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeUnsavedModal()">Keep Editing</button>
        <button class="btn-save" onclick="confirmDiscard()">Discard</button>
      </div>
    </div>
  </div>

<script>
  var SUPABASE_URL = 'https://llkatqqkzjzqfaosmrjl.supabase.co';
  var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxsa2F0cXFremp6cWZhb3NtcmpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyNDQ4MzQsImV4cCI6MjA5NzgyMDgzNH0.PA0uYmHZrfQB399jXr7LEUH0aU2CniFSkmFfZPy-dTs';

  // ---------- Low-level auth REST calls (no SDK, matches no-framework stack rule) ----------
  async function authRequest(path, body){
    var res = await fetch(SUPABASE_URL + '/auth/v1/' + path, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_ANON_KEY
      },
      body: JSON.stringify(body)
    });
    var data = await res.json();
    if(!res.ok){
      throw new Error(data.error_description || data.msg || 'Authentication failed');
    }
    return data;
  }

  function saveSession(session){
    sessionStorage.setItem('coa_session', JSON.stringify(session));
  }
  function getSession(){
    var raw = sessionStorage.getItem('coa_session');
    return raw ? JSON.parse(raw) : null;
  }
  function clearSession(){
    sessionStorage.removeItem('coa_session');
  }

  async function handleLogin(){
    var email = document.getElementById('login-email').value.trim();
    var password = document.getElementById('login-password').value;
    var errorEl = document.getElementById('login-error');
    var btn = document.getElementById('login-btn');
    errorEl.textContent = '';

    if(!email || !password){
      errorEl.textContent = 'Enter your email and password.';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Signing in...';

    try{
      var data = await authRequest('token?grant_type=password', { email: email, password: password });
      saveSession(data);
      showApp(data.user.email);
    }catch(e){
      errorEl.textContent = 'Incorrect email or password.';
    }finally{
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }

  function handleLogout(){
    clearSession();
    document.getElementById('app-shell').classList.remove('active');
    document.getElementById('login-wrap').style.display = 'flex';
    document.getElementById('login-email').value = '';
    document.getElementById('login-password').value = '';
  }

  // ---------- Data REST calls (read-only, table access via PostgREST) ----------
  async function dbRequest(path){
    var session = getSession();
    var res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': 'Bearer ' + (session ? session.access_token : SUPABASE_ANON_KEY)
      }
    });
    if(!res.ok){
      throw new Error('Request failed: ' + res.status);
    }
    return res.json();
  }

  function getInitials(name){
    if(!name) return '?';
    var parts = name.trim().split(' ');
    return (parts[0][0] + (parts.length > 1 ? parts[parts.length - 1][0] : '')).toUpperCase();
  }

  function formatDate(d){
    if(!d) return '—';
    return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  var currentProfile = null;
  var currentSupervisorName = '—';
  var employeeEditableFields = ['phone', 'bio'];
  var adminEditableFields = ['full_name', 'job_title', 'department', 'phone', 'bio', 'employment_status', 'clearance_level', 'clearance_investigation_type', 'clearance_granted_date', 'clearance_expiration_date'];
  var isEditingProfile = false;
  var pendingNavTarget = null;

  function isAdmin(){
    return currentProfile && currentProfile.role === 'admin';
  }

  async function loadProfile(){
    var container = document.getElementById('profile-content');
    var session = getSession();
    if(!session || !session.user){ return; }

    try{
      var rows = await dbRequest('profiles?id=eq.' + session.user.id + '&select=*');
      if(!rows.length){
        container.innerHTML = '<div class="placeholder-card"><div class="placeholder-title">No profile found</div><div class="placeholder-sub">This account has no profile record yet.</div></div>';
        return;
      }
      var p = rows[0];
      currentProfile = p;

      var supervisorName = '—';
      if(p.manager_id){
        try{
          var mgrRows = await dbRequest('profiles?id=eq.' + p.manager_id + '&select=full_name');
          if(mgrRows.length){ supervisorName = mgrRows[0].full_name; }
        }catch(e){ console.error(e); }
      }
      currentSupervisorName = supervisorName;
      isEditingProfile = false;

      renderProfile(p, supervisorName, false);
    }catch(e){
      container.innerHTML = '<div class="placeholder-card"><div class="placeholder-title">Couldn\'t load profile</div><div class="placeholder-sub">Try refreshing the page.</div></div>';
      console.error(e);
    }
  }

  function renderProfile(p, supervisorName, editMode){
    var container = document.getElementById('profile-content');
    var admin = isAdmin();
    var editableList = admin ? adminEditableFields : employeeEditableFields;

    function isEditable(key){
      return editMode && editableList.indexOf(key) !== -1;
    }

    function textField(key, label, value){
      if(isEditable(key)){
        return '<div class="info-box"><div class="info-label">' + label + '</div><input class="info-edit-input" id="edit-' + key + '" value="' + (value || '').toString().replace(/"/g, '&quot;') + '"></div>';
      }
      return '<div class="info-box"><div class="info-label">' + label + '</div><div class="info-val">' + (value || '—') + '</div></div>';
    }

    function dateField(key, label, value){
      if(isEditable(key)){
        return '<div class="info-box"><div class="info-label">' + label + '</div><input type="date" class="info-edit-input" id="edit-' + key + '" value="' + (value || '') + '"></div>';
      }
      return '<div class="info-box"><div class="info-label">' + label + '</div><div class="info-val">' + formatDate(value) + '</div></div>';
    }

    var nameBlock = isEditable('full_name')
      ? '<input class="info-edit-input" id="edit-full_name" value="' + (p.full_name || '').replace(/"/g, '&quot;') + '" style="font-family:\'Bebas Neue\',sans-serif;font-size:20px;margin-bottom:4px;">'
      : '<div class="profile-name">' + (p.full_name || '—') + '</div>';

    var titleBlock = isEditable('job_title')
      ? '<input class="info-edit-input" id="edit-job_title" value="' + (p.job_title || '').replace(/"/g, '&quot;') + '">'
      : '<div class="profile-role">' + (p.job_title || '—') + ' · Employee #' + p.employee_number + '</div>';

    var bioBlock = isEditable('bio')
      ? '<div class="bio-box"><div class="info-label">Bio</div><textarea class="info-edit-input" id="edit-bio" rows="3">' + (p.bio || '') + '</textarea></div>'
      : '<div class="bio-box"><div class="info-label">Bio</div><div class="info-val">' + (p.bio || 'No bio added yet.') + '</div></div>';

    var photoBlock = '<div class="profile-photo-initials">' + getInitials(p.full_name) + '</div>';

    container.innerHTML =
      '<div class="profile-card">'
      + '<div class="profile-top">'
      + '<div class="photo-wrap">' + photoBlock + '</div>'
      + '<div>' + nameBlock + titleBlock + '</div>'
      + '</div>'
      + '<div class="profile-grid">'
      + '<div class="info-box"><div class="info-label">Email</div><div class="info-val">' + (p.email || '—') + '</div></div>'
      + textField('phone', 'Phone', p.phone)
      + textField('department', 'Department', p.department)
      + '<div class="info-box"><div class="info-label">Supervisor</div><div class="info-val">' + supervisorName + '</div></div>'
      + dateField('start_date', 'Start Date', p.start_date)
      + textField('employment_status', 'Status', p.employment_status)
      + '</div>'
      + bioBlock
      + '<div class="clearance-section">'
      + '<div class="profile-grid">'
      + textField('clearance_level', 'Clearance Level', p.clearance_level)
      + textField('clearance_investigation_type', 'Investigation Type', p.clearance_investigation_type)
      + dateField('clearance_granted_date', 'Granted', p.clearance_granted_date)
      + dateField('clearance_expiration_date', 'Expires', p.clearance_expiration_date)
      + '</div></div>'

          ? '<button class="btn-save" onclick="saveProfile()">Save</button><button class="btn-cancel" onclick="requestCancelEdit()">Cancel</button><span class="save-status" id="save-status"></span>'
          : '<button class="btn-edit" onclick="editProfile()">Edit Profile</button>')
      + '</div>'
      + '</div>';

    // Track unsaved changes once fields render
    if(editMode){

      });

  function editProfile(){
    renderProfile(currentProfile, currentSupervisorName, true);
  }

  function requestCancelEdit(){
    isEditingProfile = false;
    loadProfile();
  }

  async function saveProfile(){
    var statusEl = document.getElementById('save-status');
    var editableList = isAdmin() ? adminEditableFields : employeeEditableFields;
    var updates = {};
    editableList.forEach(function(key){
      var el = document.getElementById('edit-' + key);
      if(el){ updates[key] = el.value; }
    });

    statusEl.textContent = 'Saving...';
    var session = getSession();
    try{
      var res = await fetch(SUPABASE_URL + '/rest/v1/profiles?id=eq.' + session.user.id, {
        method: 'PATCH',
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': 'Bearer ' + session.access_token,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify(updates)
      });
      if(!res.ok){ throw new Error('Save failed'); }
      statusEl.textContent = 'Saved';
      isEditingProfile = false;
      setTimeout(loadProfile, 600);
    }catch(e){
      statusEl.textContent = 'Save failed — try again';
      console.error(e);
    }
  }

  // ---------- Resume screen ----------
  var currentResume = null;
  var currentResumeOwner = null;
  var isEditingResume = false;

  function canEditResume(){
    var session = getSession();
    return currentResumeOwner && (currentResumeOwner.id === session.user.id || isAdmin());
  }

  function escAttr(v){
    return (v == null ? '' : String(v)).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function workHistoryRowHtml(w, idx){
    w = w || {};
    var headerLabel = (idx === 0) ? 'Current Job' : ('Job ' + (idx + 1));
    var checked = w.current ? 'checked' : '';
    var checkboxHtml = (idx === 0)
      ? '<label class="resume-row-checkbox"><input type="checkbox" data-field="current" ' + checked + ' onchange="this.closest(\'.resume-row\').querySelector(\'[data-field=end]\').disabled = this.checked; if(this.checked){ this.closest(\'.resume-row\').querySelector(\'[data-field=end]\').value=\'\'; }">I currently work here</label>'
      : '';
    return '<div class="resume-row">'
      + '<div class="resume-row-header">' + headerLabel + '</div>'
      + '<div class="resume-row-grid">'
      + '<input class="info-edit-input" placeholder="Job title" data-field="title" value="' + escAttr(w.title) + '">'
      + '<input class="info-edit-input" placeholder="Company" data-field="company" value="' + escAttr(w.company) + '">'
      + '<input type="date" class="info-edit-input" data-field="start" value="' + escAttr(w.start) + '">'
      + '<input type="date" class="info-edit-input" data-field="end" value="' + escAttr(w.end) + '" ' + (idx === 0 && w.current ? 'disabled' : '') + '>'
      + '</div>'
      + checkboxHtml
      + '<textarea class="info-edit-input" placeholder="Description" data-field="description" rows="2">' + escAttr(w.description) + '</textarea>'
      + '<button type="button" class="btn-remove-row" onclick="this.closest(\'.resume-row\').remove(); renumberWorkRows();">Remove</button>'
      + '</div>';
  }

  function renumberWorkRows(){
    var rows = document.querySelectorAll('#work-history-rows .resume-row');
    rows.forEach(function(row, i){
      row.querySelector('.resume-row-header').textContent = (i === 0) ? 'Current Job' : ('Job ' + (i + 1));
      var existingCheckbox = row.querySelector('.resume-row-checkbox');
      if(i === 0 && !existingCheckbox){
        row.querySelector('.resume-row-grid').insertAdjacentHTML('afterend',
          '<label class="resume-row-checkbox"><input type="checkbox" data-field="current" onchange="this.closest(\'.resume-row\').querySelector(\'[data-field=end]\').disabled = this.checked; if(this.checked){ this.closest(\'.resume-row\').querySelector(\'[data-field=end]\').value=\'\'; }">I currently work here</label>');
      }else if(i !== 0 && existingCheckbox){
        var endInput = row.querySelector('[data-field=end]');
        endInput.disabled = false;
        existingCheckbox.remove();
      }
    });
  }

  function eduRowHtml(ed){
    ed = ed || {};
    return '<div class="resume-row">'
      + '<div class="resume-row-grid">'
      + '<input class="info-edit-input" placeholder="Degree" data-field="degree" value="' + escAttr(ed.degree) + '">'
      + '<input class="info-edit-input" placeholder="School" data-field="school" value="' + escAttr(ed.school) + '">'
      + '<input class="info-edit-input" placeholder="Location (city, state)" data-field="location" value="' + escAttr(ed.location) + '">'

  function certRowHtml(c){
    c = c || {};

      + '<div class="resume-row-grid">'
      + '<input class="info-edit-input" placeholder="Certification name" data-field="name" value="' + escAttr(c.name) + '">'
      + '<input class="info-edit-input" placeholder="Issuer" data-field="issuer" value="' + escAttr(c.issuer) + '">'
      + '<input type="date" class="info-edit-input" data-field="date" value="' + escAttr(c.date) + '">'

  function addWorkRow(){ document.getElementById('work-history-rows').insertAdjacentHTML('beforeend', workHistoryRowHtml(null, document.querySelectorAll('#work-history-rows .resume-row').length)); }
  function addEduRow(){ document.getElementById('education-rows').insertAdjacentHTML('beforeend', eduRowHtml()); }
  function addCertRow(){ document.getElementById('cert-rows').insertAdjacentHTML('beforeend', certRowHtml()); }

  function harvestRows(containerId, fields, checkboxFields){
    checkboxFields = checkboxFields || [];
    var rows = document.querySelectorAll('#' + containerId + ' .resume-row');
    var out = [];
    rows.forEach(function(row){
      var obj = {};
      var any = false;
      fields.forEach(function(f){
        var el = row.querySelector('[data-field="' + f + '"]');
        var v = el ? el.value.trim() : '';
        obj[f] = v;
        if(v){ any = true; }
      });
      checkboxFields.forEach(function(f){
        var el = row.querySelector('[data-field="' + f + '"]');
        obj[f] = el ? el.checked : false;
      });
      if(any){ out.push(obj); }
    });
    return out;
  }

  async function loadResume(ownerId){
    var container = document.getElementById('resume-content');
    container.innerHTML = '<div class="placeholder-card"><div class="placeholder-sub">Loading resume...</div></div>';
    try{
      var rows = await dbRequest('resumes?id=eq.' + ownerId + '&select=*,profiles(full_name,job_title)');
      if(!rows.length){
        container.innerHTML = '<div class="placeholder-card"><div class="placeholder-title">No resume found</div><div class="placeholder-sub">This employee has no resume record yet.</div></div>';
        return;
      }
      currentResume = rows[0];
      currentResumeOwner = rows[0].profiles || {};
      currentResumeOwner.id = ownerId;
      isEditingResume = false;
      renderResumeBanner();
      renderResume(currentResume, currentResumeOwner, false);
    }catch(e){
      container.innerHTML = '<div class="placeholder-card"><div class="placeholder-title">Couldn\'t load resume</div><div class="placeholder-sub">Try refreshing the page.</div></div>';
      console.error(e);
    }
  }

  function renderResumeBanner(){
    var el = document.getElementById('resume-viewing-banner');
    var session = getSession();
    if(currentResumeOwner.id !== session.user.id){
      el.innerHTML = '<div class="resume-viewing-banner">Viewing <strong>' + (currentResumeOwner.full_name || '—') + '</strong>\'s resume &nbsp;·&nbsp; <a href="#" onclick="requestViewResume(\'' + session.user.id + '\');return false;">Back to mine</a></div>';
    }else{
      el.innerHTML = '';
    }
  }

  function renderResume(r, owner, editMode){

    var summaryBlock = editable
      ? '<div class="resume-section"><div class="resume-section-title">Summary</div><textarea class="info-edit-input" id="edit-summary" rows="3">' + escAttr(r.summary) + '</textarea></div>'

      ? '<div class="resume-section"><div class="resume-section-title">Contact</div><div class="profile-grid">'
        + '<div class="info-box"><div class="info-label">Email</div><input type="email" class="info-edit-input" id="edit-email" value="' + escAttr(r.email) + '"></div>'
        + '<div class="info-box"><div class="info-label">LinkedIn</div><input type="url" class="info-edit-input" id="edit-linkedin_url" placeholder="https://linkedin.com/in/..." value="' + escAttr(r.linkedin_url) + '"></div>'
        + '<div class="info-box"><div class="info-label">Years Experience</div><input type="text" class="info-edit-input" id="edit-years_experience" value="' + escAttr(r.years_experience) + '"></div>'

        + '</div></div>'
      : '<div class="resume-section"><div class="resume-section-title">Contact</div><div class="profile-grid">'
        + '<div class="info-box"><div class="info-label">Email</div><div class="info-val">' + (r.email || '—') + '</div></div>'
        + '<div class="info-box"><div class="info-label">LinkedIn</div><div class="info-val">' + (r.linkedin_url ? '<a href="' + r.linkedin_url + '" target="_blank" style="color:var(--teal);">' + r.linkedin_url + '</a>' : '—') + '</div></div>'
        + '<div class="info-box"><div class="info-label">Years Experience</div><div class="info-val">' + (r.years_experience != null && r.years_experience !== '' ? r.years_experience : '—') + '</div></div>'
        + '<div class="info-box"><div class="info-label">Personal Phone</div><div class="info-val">' + (r.personal_phone || '—') + '</div></div>'
        + '</div></div>';


    var workBlock = editable
      ? '<div class="resume-section"><div class="resume-section-title">Work History</div><div id="work-history-rows">' + (r.work_history || []).map(function(w, i){ return workHistoryRowHtml(w, i); }).join('') + '</div><button type="button" class="btn-add-row" onclick="addWorkRow()">+ Add position</button></div>'
      : listView('Work History', r.work_history, function(w, i){
          var label = (i === 0) ? 'Current Job' : ('Job ' + (i + 1));
          return '<div class="resume-view-row"><div class="resume-row-header">' + label + '</div><div class="resume-view-row-title">' + (w.title || '—') + ' · ' + (w.company || '—') + '</div>'
            + '<div class="resume-view-row-dates">' + formatDate(w.start) + ' – ' + (w.current ? 'Present' : formatDate(w.end)) + '</div>'
            + (w.description ? '<div class="resume-view-row-desc">' + w.description + '</div>' : '')
            + '</div>';
        });

    var eduBlock = editable
      ? '<div class="resume-section"><div class="resume-section-title">Education</div><div id="education-rows">' + (r.education || []).map(eduRowHtml).join('') + '</div><button type="button" class="btn-add-row" onclick="addEduRow()">+ Add education</button></div>'
      : listView('Education', r.education, function(ed){
          return '<div class="resume-view-row"><div class="resume-view-row-title">' + (ed.degree || '—') + ' · ' + (ed.school || '—') + (ed.location ? ' · ' + ed.location : '') + '</div>'
            + '<div class="resume-view-row-dates">' + (ed.year || '') + (ed.gpa ? ' · GPA ' + ed.gpa : '') + '</div>'
            + (ed.honors ? '<div class="resume-view-row-desc">' + ed.honors + '</div>' : '')
            + '</div>';
        });

    var certBlock = editable
      ? '<div class="resume-section"><div class="resume-section-title">Certifications</div><div id="cert-rows">' + (r.certifications || []).map(certRowHtml).join('') + '</div><button type="button" class="btn-add-row" onclick="addCertRow()">+ Add certification</button></div>'
      : listView('Certifications', r.certifications, function(c){
          return '<div class="resume-view-row"><div class="resume-view-row-title">' + (c.name || '—') + ' · ' + (c.issuer || '—') + '</div>'
            + '<div class="resume-view-row-dates">Earned ' + formatDate(c.date) + (c.expiration ? ' · Expires ' + formatDate(c.expiration) : '') + '</div></div>';
        });

    var skillsBlock = editable
      ? '<div class="resume-section"><div class="resume-section-title">Skills</div>'
        + '<div class="skill-pill-list" id="skill-pill-list">' + (r.skills || []).map(function(s){ return skillPillHtml(s); }).join('') + '</div>'
        + '<div class="skill-pill-input-wrap">'
        + '<span class="save-status" id="skill-counter"></span>'
        + '<div class="skill-bank-panel" id="skill-bank-dropdown">'
        + '<input class="info-edit-input" id="skill-bank-filter" placeholder="Filter skills or type a new one..." autocomplete="off" style="margin:8px;width:calc(100% - 16px);" oninput="renderSkillDropdownList(this.value)">'
        + '<div class="skill-bank-options-list" id="skill-bank-options"></div>'
        + '</div></div>'
        + '</div>'
      : '<div class="resume-section"><div class="resume-section-title">Skills</div>'
        + (r.skills && r.skills.length
            ? '<div class="skills-tags">' + r.skills.map(function(s){ return '<span class="skill-tag">' + s + '</span>'; }).join('') + '</div>'

    container.innerHTML =
      '<div class="profile-card">'

      + summaryBlock
      + contactBlock
      + workBlock + eduBlock + certBlock + skillsBlock
      + '<div class="profile-actions">'
      + (editMode
          ? '<button class="btn-save" onclick="saveResume()">Save</button><button class="btn-cancel" onclick="requestCancelResumeEdit()">Cancel</button><span class="save-status" id="resume-save-status"></span>'
          : (canEditResume() ? '<button class="btn-edit" onclick="editResume()">Edit Resume</button>' : ''))
      + '</div>'

    if(editMode){
      isEditingResume = true;
      loadSkillsBank();
      container.querySelectorAll('input, textarea').forEach(function(el){
        el.addEventListener('input', function(){ isEditingResume = true; });
      });

  var skillsBankCache = [];
  var currentSkills = [];
  var SKILLS_MAX = 12;

  function skillPillHtml(s){
    return '<span class="skill-pill" data-skill="' + escAttr(s) + '">' + s + '<button type="button" onclick="removeSkillPill(this, \'' + escAttr(s).replace(/'/g, "\\'") + '\')">×</button></span>';
  }

  async function loadSkillsBank(){
    currentSkills = (currentResume.skills || []).slice();
    try{
      skillsBankCache = await dbRequest('skills_bank?select=label&order=label.asc');
    }catch(e){
      skillsBankCache = [];
      console.error(e);
    }
    renderSkillCounter();
    renderSkillDropdownList('');
  }

  function renderSkillCounter(){
    var el = document.getElementById('skill-counter');
    if(el){ el.textContent = currentSkills.length + '/' + SKILLS_MAX + ' selected'; }
  }

  function renderSkillDropdownList(filterText){
    var optionsEl = document.getElementById('skill-bank-options');
    var query = (filterText || '').trim().toLowerCase();
    var atMax = currentSkills.length >= SKILLS_MAX;
    var matches = skillsBankCache.filter(function(s){ return !query || s.label.toLowerCase().indexOf(query) !== -1; });
    var html = matches.map(function(s){
      var picked = currentSkills.indexOf(s.label) !== -1;
      var disabled = (!picked && atMax) ? 'disabled' : '';
      return '<label class="skill-bank-option" style="display:flex;align-items:center;gap:8px;' + (disabled ? 'opacity:0.4;' : '') + '">'
        + '<input type="checkbox" ' + (picked ? 'checked' : '') + ' ' + disabled + ' onchange="toggleSkillSelection(\'' + escAttr(s.label).replace(/'/g, "\\'") + '\', this.checked)">'
        + s.label + '</label>';
    }).join('');
    if(query && !skillsBankCache.some(function(s){ return s.label.toLowerCase() === query; }) && !atMax){
      html += '<div class="skill-bank-option add-new" onclick="addNewSkillToBank(document.getElementById(\'skill-bank-filter\').value.trim())">+ Add "' + filterText + '" to skills bank</div>';
    }
    optionsEl.innerHTML = html || '<div class="skill-bank-option" style="color:var(--muted);">No matches.</div>';
  }

  function toggleSkillSelection(label, isChecked){
    if(isChecked){
      if(currentSkills.length >= SKILLS_MAX){ return; }
      currentSkills.push(label);
      document.getElementById('skill-pill-list').insertAdjacentHTML('beforeend', skillPillHtml(label));
    }else{
      currentSkills = currentSkills.filter(function(s){ return s !== label; });
      var pill = document.querySelector('#skill-pill-list .skill-pill[data-skill="' + escAttr(label) + '"]');
      if(pill){ pill.remove(); }
    }
    isEditingResume = true;
    renderSkillCounter();
    renderSkillDropdownList(document.getElementById('skill-bank-filter').value);
  }

  async function addNewSkillToBank(label){
    if(!label || currentSkills.length >= SKILLS_MAX){ return; }
    skillsBankCache.push({ label: label });
    skillsBankCache.sort(function(a, b){ return a.label.localeCompare(b.label); });
    toggleSkillSelection(label, true);
    document.getElementById('skill-bank-filter').value = '';
    renderSkillDropdownList('');
    try{
      var session = getSession();
      await fetch(SUPABASE_URL + '/rest/v1/skills_bank', {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': 'Bearer ' + session.access_token,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ label: label, created_by: session.user.id })
      });
    }catch(e){ console.error(e); }
  }

  function removeSkillPill(btn, label){
    currentSkills = currentSkills.filter(function(s){ return s !== label; });
    btn.closest('.skill-pill').remove();
    isEditingResume = true;
    renderSkillCounter();
    renderSkillDropdownList(document.getElementById('skill-bank-filter').value);
  }

  function editResume(){
    renderResume(currentResume, currentResumeOwner, true);
  }

  function requestCancelResumeEdit(){
    isEditingResume = false;
    loadResume(currentResumeOwner.id);
  }

  async function saveResume(){
    var statusEl = document.getElementById('resume-save-status');
    var yearsVal = document.getElementById('edit-years_experience').value.trim();
    var updates = {
      summary: document.getElementById('edit-summary').value,
      email: document.getElementById('edit-email').value.trim(),
      linkedin_url: document.getElementById('edit-linkedin_url').value.trim(),
      personal_phone: document.getElementById('edit-personal_phone').value.trim(),
      years_experience: yearsVal === '' ? null : yearsVal,
      work_history: harvestRows('work-history-rows', ['title','company','start','end','description'], ['current']),
      education: harvestRows('education-rows', ['degree','school','location','year','gpa','honors']),
      certifications: harvestRows('cert-rows', ['name','issuer','date','expiration']),
      skills: currentSkills
    };
    statusEl.textContent = 'Saving...';
    var session = getSession();
    try{
      var res = await fetch(SUPABASE_URL + '/rest/v1/resumes?id=eq.' + currentResumeOwner.id, {
        method: 'PATCH',
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': 'Bearer ' + session.access_token,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify(updates)
      });
      if(!res.ok){ throw new Error('Save failed'); }
      statusEl.textContent = 'Saved';
      isEditingResume = false;
      setTimeout(function(){ loadResume(currentResumeOwner.id); }, 600);
    }catch(e){
      statusEl.textContent = 'Save failed — try again';
      console.error(e);
    }
  }

  function requestViewResume(ownerId){
    if(isEditingResume){
      pendingNavTarget = function(){ loadResume(ownerId); };
      document.getElementById('unsaved-modal').classList.add('active');
      return;
    }
    loadResume(ownerId);
  }

  async function searchResumes(){
    var q = document.getElementById('resume-search-input').value.trim();
    var resultsEl = document.getElementById('resume-search-results');
    if(!q){ resultsEl.innerHTML = ''; return; }
    resultsEl.innerHTML = '<div class="info-val" style="color:var(--muted);">Searching...</div>';
    try{
      var rows = await dbRequest('resumes?select=id,profiles(full_name,job_title)&search_doc=plfts.' + encodeURIComponent(q));
      if(!rows.length){
        resultsEl.innerHTML = '<div class="info-val" style="color:var(--muted);">No matches.</div>';
        return;
      }
      resultsEl.innerHTML = rows.map(function(r){
        var name = (r.profiles && r.profiles.full_name) || 'Unknown';
        var title = (r.profiles && r.profiles.job_title) || '';
        return '<div class="search-result-row" onclick="requestViewResume(\'' + r.id + '\')"><div class="resume-view-row-title">' + name + (title ? ' · ' + title : '') + '</div></div>';
      }).join('');
    }catch(e){
      resultsEl.innerHTML = '<div class="info-val" style="color:var(--red);">Search failed.</div>';
      console.error(e);
    }
  }

  // ---------- Unsaved changes guard ----------
  function requestSwitchScreen(name){
    if(isEditingProfile || isEditingResume){
      pendingNavTarget = name;
      document.getElementById('unsaved-modal').classList.add('active');
      return;
    }
    switchScreen(name);
  }

  function closeUnsavedModal(){
    document.getElementById('unsaved-modal').classList.remove('active');
    pendingNavTarget = null;
  }

  function confirmDiscard(){
    var wasEditingProfile = isEditingProfile;
    var wasEditingResume = isEditingResume;
    isEditingProfile = false;
    isEditingResume = false;
    document.getElementById('unsaved-modal').classList.remove('active');
    var target = pendingNavTarget;
    pendingNavTarget = null;
    if(!target){ return; }
    if(typeof target === 'function'){ target(); return; }
    switchScreen(target);
    if(target === 'profile'){ loadProfile(); }
    else if(wasEditingProfile){ renderProfile(currentProfile, currentSupervisorName, false); }
    if(target !== 'resume' && wasEditingResume){ renderResume(currentResume, currentResumeOwner, false); }
  }

  window.addEventListener('beforeunload', function(e){
    if(isEditingProfile || isEditingResume){
      e.preventDefault();
      e.returnValue = '';
    }
  });

  function showApp(email){
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('app-shell').classList.add('active');
    document.getElementById('user-email-display').textContent = email;
    loadProfile();
  }

  function switchScreen(name){
    document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.toggle('active', b.dataset.screen === name); });
    document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
    document.getElementById('screen-' + name).classList.add('active');
    if(name === 'resume'){
      document.getElementById('resume-search-wrap').style.display = isAdmin() ? 'block' : 'none';
      document.getElementById('resume-search-input').value = '';
      document.getElementById('resume-search-results').innerHTML = '';
      loadResume(getSession().user.id);
    }
  }

  // ---------- Session check on load ----------
  (function init(){
    var session = getSession();
    if(session && session.user){
      showApp(session.user.email);
    }
  })();
</script>
</body>
</html>
